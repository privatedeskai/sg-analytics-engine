<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Analytics Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:      #080C18;
  --bg2:     #0C1120;
  --bg3:     #111828;
  --bg4:     #182236;
  --bg5:     #1E2C44;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --accent:  #3B82F6;
  --accent2: #93C5FD;
  --purple:  #8B5CF6;
  --green:   #10B981;
  --green2:  #6EE7B7;
  --t1:      #F8FAFC;
  --t2:      #CBD5E1;
  --t3:      #64748B;
  --t4:      #334155;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--t1); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
body::after { content: ''; position: fixed; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--purple), var(--accent)); background-size: 200% 100%; animation: shimmer 4s linear infinite; z-index: 100; }
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

.header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 54px; border-bottom: 1px solid var(--border); background: rgba(8,12,24,0.95); backdrop-filter: blur(20px); position: relative; z-index: 10; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; box-shadow: 0 0 20px rgba(59,130,246,0.35); }
.logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.4px; }
.logo-name span { color: var(--t3); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 12px; }
.status-row { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--t2); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
.pill { font-size: 11px; font-weight: 500; padding: 4px 11px; border-radius: 20px; border: 1px solid var(--border2); color: var(--t2); background: var(--bg3); font-family: 'DM Mono', monospace; }
.pill.active { border-color: rgba(59,130,246,0.45); color: var(--accent2); background: rgba(59,130,246,0.1); }

.main { display: flex; flex: 1; overflow: hidden; }

.chat-panel { width: 380px; min-width: 220px; max-width: 70%; flex-shrink: 0; display: flex; flex-direction: column; background: var(--bg2); position: relative; z-index: 2; overflow: hidden; }

.resizer { width: 8px; flex-shrink: 0; background: var(--border); cursor: col-resize; position: relative; z-index: 5; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
.resizer:hover, .resizer.dragging { background: rgba(59,130,246,0.5); }
.resizer-dots { display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
.resizer-dots span { display: block; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.25); }
.resizer:hover .resizer-dots span, .resizer.dragging .resizer-dots span { background: rgba(255,255,255,0.6); }

.dash-panel { flex: 1; min-width: 220px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(ellipse at 70% 0%, rgba(59,130,246,0.06) 0%, transparent 60%), linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 100% 100%, 44px 44px, 44px 44px; }

.panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: rgba(8,12,24,0.5); }
.panel-label { font-size: 10px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.1em; }

.upload-zone { margin: 14px 16px; border: 1.5px dashed rgba(255,255,255,0.1); border-radius: 10px; padding: 16px 14px; text-align: center; cursor: pointer; transition: all 0.25s; background: rgba(255,255,255,0.02); flex-shrink: 0; }
.upload-zone:hover, .upload-zone.drag-over { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.06); }
.upload-zone.has-file { border-color: rgba(16,185,129,0.45); background: rgba(16,185,129,0.06); }
.upload-icon-wrap { width: 34px; height: 34px; border-radius: 9px; background: var(--bg4); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 15px; }
.upload-title { font-size: 13px; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
.upload-sub { font-size: 11px; color: var(--t3); line-height: 1.5; }
.upload-sub strong { color: var(--accent2); font-weight: 500; }
.upload-file-name { font-size: 11px; color: var(--green2); font-weight: 500; font-family: 'DM Mono', monospace; margin-top: 6px; }

.messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--bg5) transparent; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 2px; }
.msg-user { background: var(--bg5); border: 1px solid var(--border2); border-radius: 12px 12px 3px 12px; padding: 9px 13px; font-size: 13px; align-self: flex-end; max-width: 88%; line-height: 1.55; }
.msg-ai { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.18); border-left: 2px solid var(--accent); border-radius: 3px 12px 12px 12px; padding: 10px 13px; font-size: 13px; line-height: 1.65; max-width: 96%; }
.msg-ai
