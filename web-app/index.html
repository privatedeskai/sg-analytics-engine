<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Analytics Engine</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #F5F5F5;
    color: #222;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #E0E0E0;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-logo {
    font-size: 16px;
    font-weight: 600;
    color: #1A3A6B;
    letter-spacing: -0.02em;
  }
  .header-logo span { color: #378ADD; }
  .header-status { font-size: 12px; color: #888; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .chat-panel {
    width: 40%;
    min-width: 340px;
    background: #fff;
    border-right: 1px solid #E0E0E0;
    display: flex;
    flex-direction: column;
  }

  .chat-panel-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid #F0F0F0;
    font-size: 11px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .upload-zone {
    margin: 12px 16px;
    border: 1.5px dashed #D0D0D0;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #FAFAFA;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: #378ADD; background: #EEF5FD; }
  .upload-zone.has-file { border-color: #1D9E75; background: #F0FBF4; }
  .upload-zone-icon { font-size: 20px; margin-bottom: 4px; }
  .upload-zone-text { font-size: 12px; color: #888; }
  .upload-zone-text strong { color: #378ADD; }
  .upload-zone-filename { font-size: 12px; color: #1D9E75; font-weight: 500; margin-top: 2px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg-user {
    background: #F0F0F0;
    border-radius: 10px 10px 2px 10px;
    padding: 8px 12px;
    font-size: 13px;
    color: #222;
    align-self: flex-end;
    max-width: 88%;
  }

  .msg-ai {
    background: #E8F0FE;
    border-radius: 10px 10px 10px 2px;
    padding: 10px 12px;
    font-size: 13px;
    color: #1A3A6B;
    border-left: 2px solid #378ADD;
    line-height: 1.6;
    max-width: 96%;
    white-space: pre-wrap;
  }

  .msg-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #F8F8F8;
    border-radius: 8px;
    font-size: 12px;
    color: #555;
  }

  .progress-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #1D9E75;
    flex-shrink: 0;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .msg-error {
    background: #FEE8E8;
    border-left: 2px solid #E24B4A;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: #A32D2D;
  }

  .chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid #F0F0F0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
